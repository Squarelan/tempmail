[databases]
# ★ host=postgres 是 Docker 内部服务名，port=5432 是 PostgreSQL 容器内端口。
# 这两个值通常不需要修改，它们是容器间内部通信地址，与宿主机端口无关。
tempmail = host=postgres port=5432 dbname=tempmail auth_user=tempmail

[pgbouncer]
listen_addr = 0.0.0.0
# ★ PgBouncer 容器内监听端口，默认 6432。
# 这是内部端口，不对外暴露。API 通过 .env 的 API_DB_DSN 连接此端口。
# 如需修改，必须同步修改：
#   1. .env / .env.example 中 API_DB_DSN 里的 @pgbouncer:6432 → @pgbouncer:xxxx
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 10000
default_pool_size = 200
min_pool_size = 20
reserve_pool_size = 50
reserve_pool_timeout = 3
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 5
server_login_retry = 1
query_timeout = 30
query_wait_timeout = 30
client_idle_timeout = 300
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
admin_users = tempmail
